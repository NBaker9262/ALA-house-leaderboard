<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>House Points Leaderboard</title>
<link rel="stylesheet" href="leaderboard.css" />
</head>

<body>
<div class="wrap">
  <header>
    <h1>House Points Leaderboard</h1>
  </header>

  <div class="chart-area">
    <div class="y-grid" aria-hidden="true"></div>

    <div class="bar" data-house="red">
      <div class="bar-track">
        <div id="bar-red" class="bar-inner red"><span id="score-red" class="score-text">0</span></div>
        <img
          id="icon-red"
          class="house-icon"
          alt="Panda house"
          src="https://raw.githubusercontent.com/NBaker9262/ALA-house-leaderboard/main/Panda%20%20(blank%20background).png"
        >
      </div>
    </div>

    <div class="bar" data-house="white">
      <div class="bar-track">
        <div id="bar-white" class="bar-inner white"><span id="score-white" class="score-text">0</span></div>
        <img
          id="icon-white"
          class="house-icon"
          alt="Polar house"
          src="https://raw.githubusercontent.com/NBaker9262/ALA-house-leaderboard/main/Polar%20%20(blank%20background).png"
        >
      </div>
    </div>

    <div class="bar" data-house="blue">
      <div class="bar-track">
        <div id="bar-blue" class="bar-inner blue"><span id="score-blue" class="score-text">0</span></div>
        <img
          id="icon-blue"
          class="house-icon"
          alt="Grizzly house"
          src="https://raw.githubusercontent.com/NBaker9262/ALA-house-leaderboard/main/Grizzly%20%20(blank%20background).png"
        >
      </div>
    </div>

    <div class="bar" data-house="silver">
      <div class="bar-track">
        <div id="bar-silver" class="bar-inner silver"><span id="score-silver" class="score-text">0</span></div>
        <img
          id="icon-silver"
          class="house-icon"
          alt="Kodiak house"
          src="https://raw.githubusercontent.com/NBaker9262/ALA-house-leaderboard/main/Kodiak%20%20(blank%20background).png"
        >
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script type="module" src="leaderboard.js"></script>
</body>
</html>
